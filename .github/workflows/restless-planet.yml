name: Restless Planet Build
on:
  push:
    branches: [restless-planet-build]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build frozen artifact
        run: python restless_planet/build.py
      - name