name: Restless Planet Build
on:
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build frozen artifact
        run: python restless_planet/build.py
      - name: Upload deliverables
        uses: actions/upload-artifact@v4
        with:
          name: restless-planet-deliverables
          path: dist/
          if-no-files-found: error
